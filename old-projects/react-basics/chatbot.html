<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
    <style>
      body{
        font-family: Roboto, Arial;
        margin-top: 0;
        margin-bottom: 0;
      }
      .send-button{
        background-color: rgb(25, 135, 84);
        color: white;
        padding: 12px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
      }
      .chat-input{
        padding: 12px 15px;
        border-radius: 10px;
        border: 1px solid black;
        font-size: 15px;
        flex-grow: 1;
      }
      .chat-input-container{
        display: flex;
        margin-bottom: 60px;
      }
      .app-container{
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        /* vh = viewport height(the height of the browser) -> 100vh = 100% of the neight of the browser */
        height: 100vh; 

        display: flex;
        flex-direction: column;
      }
      .chat-message-user{
        display: flex;
        justify-content: end;
        align-items: start;
      }
      .chat-message-text{
        background-color: rgb(238, 238, 238);
        padding: 15px 20px;
        border-radius: 10px;
        margin-right: 10px;
        margin-left: 10px;
        margin-bottom: 20px;
        max-width: 300px ;
      }
      .chat-message-robot{
        display: flex;
        align-items: start;
      }
      .chat-message-profile{
        width: 45px;
      }
      
      .chat-messages-container{
        flex-grow:1;      
        margin-top: 20px;
        /* make the container scrollable */
        overflow: scroll;
        /* hide scroll bar */
        scrollbar-width: none;
        
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script type="text/babel">
      //component 1
      function ChatInput({ chatMessages,setChatMessages }) { 

        const [inputText, setInputText] = React.useState('');

        function saveInputText(event) {
          setInputText(event.target.value);
        }

        function sendMessage(){

          // using spread operator we made a copy of chatMessages array, and then we added a value at end of the new array.
          const newChatMessages = [
            ...chatMessages, 
            {
              message: inputText,
              sender: 'user',
              id: crypto.randomUUID()
            }
          ];
          setChatMessages(newChatMessages);

          const response = Chatbot.getResponse(inputText);
          
          setChatMessages([
            ...newChatMessages, 
            {
              message: response,
              sender: 'robot',
              id: crypto.randomUUID()
            }
          ]);

          setInputText('');
        }

        return (
            <div className="chat-input-container">
              <input 
                placeholder="Send a message to Chatbox" 
                size="30"
                onChange={saveInputText}
                //value = change the text inside this <Input>
                value={inputText}
                className="chat-input"
              /> 
              <button
                onClick={sendMessage}
                className="send-button"
              >Send</button>
            </div>
        )
      }

      //component 2
      function ChatMessage({ message, sender }) {
        // const message = props.message;
        // const sender = props.sender;
        // we call this destructuring -> shortcut for these lines above
        // const { message, sender } = props;

        // if(sender === 'robot'){
        //   return(
        //     <div>
        //       <img src="robot.png" alt="user-image" width="50"/>
        //       {message}
        //     </div>
        //   );
        // }

        return (
          <div className={sender === 'user' ? 'chat-message-user': 'chat-message-robot'}>
            {sender === 'robot' && (
              <img src="robot.png" alt="user-image" className="chat-message-profile"/>
            )}
            <div className="chat-message-text">
              {message}
            </div>
            {sender === 'user' && (
              <img src="user.png" alt="user-image" className="chat-message-profile"/>
            )}
          </div>
        );
      }

      //Component 3
      function ChatMessages({ chatMessages }) {

        /*  
          function sendMessage() {
            this is how we push directly it won't work.
            chatMessages.push({ 
              message: 'test',
              sender: 'user',
              // every id has unique value
              id: crypto.randomUUID()
            });

            console.log(chatMessages);

            using spread operator we made a copy of chatMessages array, and then we added a value at end of the new array.
            setChatMessages([
              ...chatMessages, 
              {
                message: 'test',
                sender: 'user',
                id: crypto.randomUUID()
              }
            ]);
            
          }
        */
        //useRef = automatically save an HTML element from the component.
        //null - initial value
        const chatMessagesRef = React.useRef(null);
        //react will run this function, after component is created and every time the component is updated.
        //Array at the end controls when useEffect runs.
        //empty array = [] -> only run once, after the component is created. This is called depenency array
        //In here [chatMessages] = run this function every time chatMessages changes.
        React.useEffect(() => {
          const containerElem = chatMessagesRef.current;
          if(containerElem){
            containerElem.scrollTop = containerElem.scrollHeight;
          }
        }, [chatMessages]);

        return (
          /*what happens in here is chat-messages-container is given to the ref container of useRef and save it in chatMessagesRef variable. useEffect access it and changes the chat-messages-container to handle auto scroll feature*/
          <div className="chat-messages-container" ref={chatMessagesRef}>
            {chatMessages.map((chatMessage) => {
              return (
                <ChatMessage 
                  message={chatMessage.message}
                  sender={chatMessage.sender}
                  key={chatMessage.id}
                />
              );
            })}
          </div>
        )

      }

      //component 4
      function App() {

        // in here React.useState() converts whole data into a state. UseState gives us 2 values. 
        // 1) current data.
        // 2) function to update the data(updater function)
        
        const [ chatMessages, setChatMessages ] = React.useState([{
          message: 'Hello Chatbot',
          sender: 'user',
          id: 'id1'
        }, {
          message: 'Hello! How can I help You!',
          sender: 'robot',
          id: 'id12'
        }, {
          message: 'Can you get me todays date?',
          sender: 'user',
          id: 'id3'
        }, {
          message: 'Today is September 27',
          sender: 'robot',
          id: 'id4'
        }]);
        
        //this is called array destructuring, 
        //const [ chatMessages, setChatMessages ] = array;

        // const chatMessages = array[0]; //current data in use state.
        // const setChatMessages = array[1]; //updater function to update the current data. It will also update the HTML.

        return(
          <div className="app-container">
            <ChatMessages
              chatMessages={chatMessages}
            />

            <ChatInput
              chatMessages={chatMessages}
              setChatMessages={setChatMessages}
            />
          </div>
        );
      }

      // we can create our own HTML elements -> <ChatInput></ChatInput> -> use to run a component.
      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App/>);
    </script>
  </body>
</html>
